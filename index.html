<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יצירת אפליקצית קלפי אוורור וחוסן - אריאל קלפנר</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (כדי שהדפדפן יבין את קוד ה-React) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- אייקונים לשימוש בכפתורים ---
        const HomeIcon = ({ className, size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        );
        const ImageIcon = ({ className, size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
        );
        const AppIcon = ({ className, size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
        );
        const GithubIcon = ({ className, size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
        );
        const UploadIcon = ({ className, size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        );
        const ExternalLinkIcon = ({ className, size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
        );

        function App() {
          const [activePage, setActivePage] = useState(1);
          const [imgSrc, setImgSrc] = useState('pic1.png');

          const navItems = [
            { id: 1, title: 'ראשי', icon: <HomeIcon className="w-4 h-4" /> },
            { id: 2, title: 'יצירת הקלפים', icon: <ImageIcon className="w-4 h-4" /> },
            { id: 3, title: 'יצירת האפליקציה', icon: <AppIcon className="w-4 h-4" /> },
            { id: 4, title: 'פתיחת חשבון GitHub', icon: <GithubIcon className="w-4 h-4" /> },
            { id: 5, title: 'העלאה ל-GitHub', icon: <UploadIcon className="w-4 h-4" /> }
          ];

          return (
            <div dir="rtl" className="min-h-screen font-sans bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 text-gray-800 pb-16">
              
              {/* Navigation Menu (Top Bar) */}
              <nav className="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 p-4 border-b border-white/50">
                <div className="container mx-auto flex justify-center">
                  <ul className="flex flex-wrap justify-center gap-2 md:gap-4">
                    {navItems.map((item) => (
                      <li key={item.id}>
                        <button
                          onClick={() => setActivePage(item.id)}
                          className={`flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-sm md:text-base ${
                            activePage === item.id 
                              ? 'bg-purple-600 text-white shadow-md font-bold' 
                              : 'bg-white/60 hover:bg-purple-100 text-purple-900'
                          }`}
                        >
                          {item.icon}
                          <span className={activePage === item.id ? 'block' : 'hidden md:block'}>{item.title}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
              </nav>

              <main className="container mx-auto px-4 mt-10 max-w-5xl">
                
                {/* Global Header */}
                <header className="flex flex-col items-center text-center mb-12">
                  <h1 className="text-3xl md:text-5xl font-extrabold text-indigo-900 mb-2 drop-shadow-sm">
                    טכנופדגוגיה, בינה מלאכותית והערכה בחינוך
                  </h1>
                  <h2 className="text-xl md:text-3xl font-semibold text-purple-700 mb-8 drop-shadow-sm">
                    עם אריאל קלפנר
                  </h2>
                  
                  {/* Header Image */}
                  <div className="relative group w-full flex justify-center">
                    <img 
                      src={imgSrc} 
                      alt="אריאל קלפנר" 
                      className="w-28 md:w-36 aspect-square rounded-3xl shadow-xl border-4 border-white object-cover"
                      onError={() => setImgSrc('https://placehold.co/400x400/e2e8f0/475569?text=pic1.png')}
                    />
                  </div>
                </header>

                {/* Page Content Rendering */}
                <div className="bg-white/60 backdrop-blur-lg border border-white/60 rounded-3xl p-6 md:p-10 shadow-2xl min-h-[400px]">
                  
                  {/* Page 1: Home / Main Navigation */}
                  {activePage === 1 && (
                    <div className="flex flex-col items-center animate-in fade-in zoom-in duration-500">
                      
                      <div className="bg-gradient-to-r from-indigo-100 via-purple-100 to-pink-100 border-2 border-white p-8 rounded-3xl shadow-lg mb-10 max-w-3xl text-center w-full">
                        <p className="text-2xl md:text-3xl font-extrabold text-indigo-900 leading-relaxed drop-shadow-sm mb-4">
                          יצירת אפליקצית קלפי אוורור וחוסן
                        </p>
                        <p className="text-lg text-purple-800">
                          ברוכים הבאים! במדריך זה נלמד צעד אחר צעד כיצד ליצור קלפים, לפתח אפליקציה ייעודית ולהעלות אותה לרשת. בחרו באחד השלבים כדי להתחיל:
                        </p>
                      </div>

                      <h3 className="text-2xl md:text-3xl font-bold text-center mb-2 text-indigo-900">
                        רוצים ליצור אפליקציה כמו זאת שכאן?
                      </h3>
                      <p className="text-lg text-gray-700 mb-8 text-center font-medium">
                        מוזמנים לעקוב אחר הסרטונים ללמוד וליצור את האפליקציה.
                      </p>

                      <div className="w-full max-w-4xl h-[500px] rounded-2xl overflow-hidden shadow-2xl border-4 border-indigo-200 mb-6 bg-white relative">
                        <iframe 
                          className="w-full h-full" 
                          src="https://arielkle.github.io/hossencardsgame/" 
                          title="Hossen Cards Game App" 
                          frameBorder="0">
                        </iframe>
                      </div>

                      <a 
                        href="https://arielkle.github.io/hossencardsgame/" 
                        target="_blank" 
                        rel="noreferrer" 
                        className="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full transition-all shadow-md hover:shadow-lg transform hover:-translate-y-1 mb-16"
                      >
                        <span>פתח אפליקציה בחלון חדש</span>
                        <ExternalLinkIcon size={20} />
                      </a>

                      {/* Big Navigation Buttons Grid */}
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
                        
                        <button onClick={() => setActivePage(2)} className="group flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-md hover:shadow-xl border-2 border-transparent hover:border-purple-300 transition-all duration-300 transform hover:-translate-y-1 cursor-pointer">
                          <div className="bg-purple-100 p-4 rounded-full mb-4 group-hover:bg-purple-200 transition-colors">
                            <ImageIcon className="w-10 h-10 text-purple-700" />
                          </div>
                          <h3 className="text-xl font-bold text-gray-800">יצירת הקלפים</h3>
                          <p className="text-gray-500 mt-2 text-center">הנחיות וכלים לעיצוב ויצירת הקלפים</p>
                        </button>

                        <button onClick={() => setActivePage(3)} className="group flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-md hover:shadow-xl border-2 border-transparent hover:border-indigo-300 transition-all duration-300 transform hover:-translate-y-1 cursor-pointer">
                          <div className="bg-indigo-100 p-4 rounded-full mb-4 group-hover:bg-indigo-200 transition-colors">
                            <AppIcon className="w-10 h-10 text-indigo-700" />
                          </div>
                          <h3 className="text-xl font-bold text-gray-800">יצירת האפליקציה</h3>
                          <p className="text-gray-500 mt-2 text-center">פיתוח ובניית האפליקציה צעד אחר צעד</p>
                        </button>

                        <button onClick={() => setActivePage(4)} className="group flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-md hover:shadow-xl border-2 border-transparent hover:border-pink-300 transition-all duration-300 transform hover:-translate-y-1 cursor-pointer">
                          <div className="bg-pink-100 p-4 rounded-full mb-4 group-hover:bg-pink-200 transition-colors">
                            <GithubIcon className="w-10 h-10 text-pink-700" />
                          </div>
                          <h3 className="text-xl font-bold text-gray-800">פתיחת חשבון ב-GitHub</h3>
                          <p className="text-gray-500 mt-2 text-center">הדרכה לפתיחת חשבון לאחסון הקוד</p>
                        </button>

                        <button onClick={() => setActivePage(5)} className="group flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-md hover:shadow-xl border-2 border-transparent hover:border-blue-300 transition-all duration-300 transform hover:-translate-y-1 cursor-pointer">
                          <div className="bg-blue-100 p-4 rounded-full mb-4 group-hover:bg-blue-200 transition-colors">
                            <UploadIcon className="w-10 h-10 text-blue-700" />
                          </div>
                          <h3 className="text-xl font-bold text-gray-800">העלאה ל-GitHub</h3>
                          <p className="text-gray-500 mt-2 text-center">העלאת התמונות והאפליקציה לרשת</p>
                        </button>

                      </div>
                    </div>
                  )}

                  {/* Page 2: יצירת הקלפים */}
                  {activePage === 2 && (
                    <div className="flex flex-col items-center animate-in fade-in zoom-in duration-500">
                      <h3 className="text-3xl font-bold text-center mb-6 text-purple-900 bg-purple-100 px-8 py-3 rounded-full inline-block shadow-sm">
                        יצירת הקלפים
                      </h3>
                      
                      <p className="text-xl text-gray-700 mb-8 max-w-2xl text-center font-medium leading-relaxed">
                        בסרטון זה נלמד ליצור קלפים מרהיבים בעזרת Gemini ו-NotebookLM. <br/>
                        <span className="text-purple-600 font-bold">צפו בסרטון ונסו.</span>
                      </p>
                      
                      <div className="flex flex-col items-center w-full mb-8">
                        <div className="w-full max-w-3xl aspect-video rounded-2xl overflow-hidden shadow-2xl bg-gray-900 border-4 border-purple-200">
                          <iframe 
                            className="w-full h-full" 
                            src="https://www.youtube.com/embed/rSfsTtN7QRY" 
                            title="YouTube video player" 
                            frameBorder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowFullScreen>
                          </iframe>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Page 3: יצירת האפליקציה */}
                  {activePage === 3 && (
                    <div className="flex flex-col items-center animate-in fade-in zoom-in duration-500">
                      <h3 className="text-3xl font-bold text-center mb-6 text-indigo-900 bg-indigo-100 px-8 py-3 rounded-full inline-block shadow-sm">
                        יצירת האפליקציה
                      </h3>
                      
                      <p className="text-xl text-gray-700 mb-8 max-w-2xl text-center font-medium leading-relaxed">
                        בסרטון זה נלמד ליצור את האפליקציה עצמה.<br/>
                        <span className="text-indigo-600 font-bold">צפו בסרטון ונסו.</span>
                      </p>
                      
                      <div className="flex flex-col items-center w-full mb-8">
                        <div className="w-full max-w-3xl aspect-video rounded-2xl overflow-hidden shadow-2xl bg-gray-900 border-4 border-indigo-200">
                          <iframe 
                            className="w-full h-full" 
                            src="https://www.youtube.com/embed/5D8WyDzxZpk" 
                            title="YouTube video player" 
                            frameBorder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowFullScreen>
                          </iframe>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Page 4: פתיחת חשבון GitHub */}
                  {activePage === 4 && (
                    <div className="flex flex-col items-center animate-in fade-in zoom-in duration-500">
                      <h3 className="text-3xl font-bold text-center mb-6 text-pink-900 bg-pink-100 px-8 py-3 rounded-full inline-block shadow-sm">
                        פתיחת חשבון ב-GitHub
                      </h3>
                      
                      <p className="text-xl text-gray-700 mb-8 max-w-2xl text-center font-medium leading-relaxed">
                        בסרטון זה נלמד ליצור חשבון ב - GitHub.<br/>
                        <span className="text-pink-600 font-bold">צפו בסרטון ונסו.</span>
                      </p>
                      
                      <div className="flex flex-col items-center w-full mb-8">
                        <div className="w-full max-w-3xl aspect-video rounded-2xl overflow-hidden shadow-2xl bg-gray-900 border-4 border-pink-200">
                          <iframe 
                            className="w-full h-full" 
                            src="https://www.youtube.com/embed/GQhrB0VL9ac" 
                            title="YouTube video player" 
                            frameBorder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowFullScreen>
                          </iframe>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Page 5: העלאה ל-GitHub */}
                  {activePage === 5 && (
                    <div className="flex flex-col items-center animate-in fade-in zoom-in duration-500">
                      <h3 className="text-3xl font-bold text-center mb-6 text-blue-900 bg-blue-100 px-8 py-3 rounded-full inline-block shadow-sm">
                        העלאה ל-GitHub
                      </h3>
                      
                      <p className="text-xl text-gray-700 mb-8 max-w-2xl text-center font-medium leading-relaxed">
                        בסרטון זה נלמד להעלות את התמונות ואת האפליקציה ל - github ונלמד איך לעדכן את קובץ האפליקציה בהתאם לצרכים שלנו.<br/>
                        <span className="text-blue-600 font-bold">צפו בסרטון ונסו.</span>
                      </p>
                      
                      <div className="flex flex-col items-center w-full mb-8">
                        <div className="w-full max-w-3xl aspect-video rounded-2xl overflow-hidden shadow-2xl bg-gray-900 border-4 border-blue-200">
                          <iframe 
                            className="w-full h-full" 
                            src="https://www.youtube.com/embed/Fe9ad8IHBfw" 
                            title="YouTube video player" 
                            frameBorder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowFullScreen>
                          </iframe>
                        </div>
                      </div>
                    </div>
                  )}
                  
                </div>
              </main>

              {/* Footer */}
              <footer className="container mx-auto mt-12 pb-6 text-center text-gray-600 font-medium">
                <p>&copy; כל הזכויות שמורות לאריאל קלפנר: טכנופדגוגיה, הערכה, בינה מלאכותית, 050-9540538</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
